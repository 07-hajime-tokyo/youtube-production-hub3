name: Transcribe worker

on:
  workflow_dispatch:
  schedule:
    - cron: "*/15 * * * *"

concurrency:
  group: transcribe-worker
  cancel-in-progress: false

jobs:
  transcribe:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      TRANSCRIBE_MODEL: ${{ vars.TRANSCRIBE_MODEL || 'small' }}
      TRANSCRIPT_MARKDOWN_EXPORT: "0"
      YTDLP_BIN: yt-dlp
      PYTHON_BIN: python3
      WORKER_ID: github-actions-transcribe

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: scripts/requirements-transcribe.txt

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install Node dependencies
        run: npm ci

      - name: Install transcription dependencies
        run: python3 -m pip install --upgrade pip -r scripts/requirements-transcribe.txt

      - name: Restore YouTube cookies
        env:
          YOUTUBE_COOKIES_BASE64: ${{ secrets.YOUTUBE_COOKIES_BASE64 }}
          YOUTUBE_COOKIES_BASE64_1: ${{ secrets.YOUTUBE_COOKIES_BASE64_1 }}
          YOUTUBE_COOKIES_BASE64_2: ${{ secrets.YOUTUBE_COOKIES_BASE64_2 }}
          YOUTUBE_COOKIES_BASE64_3: ${{ secrets.YOUTUBE_COOKIES_BASE64_3 }}
          YOUTUBE_COOKIES_BASE64_4: ${{ secrets.YOUTUBE_COOKIES_BASE64_4 }}
          YOUTUBE_COOKIES_BASE64_5: ${{ secrets.YOUTUBE_COOKIES_BASE64_5 }}
        run: |
          COOKIE_B64="${YOUTUBE_COOKIES_BASE64:-}${YOUTUBE_COOKIES_BASE64_1:-}${YOUTUBE_COOKIES_BASE64_2:-}${YOUTUBE_COOKIES_BASE64_3:-}${YOUTUBE_COOKIES_BASE64_4:-}${YOUTUBE_COOKIES_BASE64_5:-}"
          if [ -z "$COOKIE_B64" ]; then
            echo "No YouTube cookies secret configured."
            exit 0
          fi
          printf '%s' "$COOKIE_B64" | base64 --decode > "$RUNNER_TEMP/youtube-cookies.txt"
          chmod 600 "$RUNNER_TEMP/youtube-cookies.txt"
          echo "YTDLP_COOKIES_PATH=$RUNNER_TEMP/youtube-cookies.txt" >> "$GITHUB_ENV"

      - name: Process one queued transcription job
        run: npm run worker -- next --type transcribe
